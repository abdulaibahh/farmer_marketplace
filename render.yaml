services:
  - type: web
    name: farmer-marketplace-api
    env: node
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CURRENCY
        value: usd
      - key: PAYMENT_FX_RATE
        value: "20000"
      - key: PAYMENT_RETURN_URL
        sync: false
